<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Leaderboard — Option B</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F5;
      padding: 16px;
      max-width: 390px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #27500A;
    }

    select {
      font-size: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 6px 10px;
      background: white;
      color: #27500A;
      font-weight: 500;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Row */
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid #f3f4f6;
    }
    .row:last-child { border-bottom: none; }

    .rank {
      font-size: 15px;
      font-weight: 700;
      color: #27500A;
      width: 20px;
      flex-shrink: 0;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #27500A;
      color: white;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Middle: two lines */
    .info {
      flex: 1;
      min-width: 0;
    }

    .line1 {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .line2 {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
      white-space: nowrap;
    }

    .line2 .wins  { color: #639922; font-weight: 600; }
    .line2 .losses { color: #ef4444; font-weight: 600; }
    .line2 .streak-win  { color: #639922; font-weight: 700; }
    .line2 .streak-loss { color: #ef4444; font-weight: 700; }

    /* Right: points */
    .pts-col {
      text-align: right;
      flex-shrink: 0;
    }

    .pts {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
      display: block;
    }

    .pts-label {
      font-size: 10px;
      color: #9ca3af;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h2>Leaderboard</h2>
    <select>
      <option>Spring 2026 (active)</option>
    </select>
  </div>

  <div class="card">

    <!-- Row 1 -->
    <div class="row">
      <span class="rank">1</span>
      <div class="avatar">D</div>
      <div class="info">
        <div class="line1">Damir</div>
        <div class="line2">
          1216 ELO &nbsp;·&nbsp;
          <span class="wins">1W</span> <span class="losses">0L</span> &nbsp;·&nbsp;
          100% &nbsp;·&nbsp;
          <span class="streak-win">W1</span>
        </div>
      </div>
      <div class="pts-col">
        <span class="pts">3</span>
        <span class="pts-label">pts</span>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <span class="rank">2</span>
      <div class="avatar">J</div>
      <div class="info">
        <div class="line1">Josip</div>
        <div class="line2">
          1200 ELO &nbsp;·&nbsp;
          <span class="wins">0W</span> <span class="losses">0L</span> &nbsp;·&nbsp;
          — &nbsp;·&nbsp; —
        </div>
      </div>
      <div class="pts-col">
        <span class="pts">0</span>
        <span class="pts-label">pts</span>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <span class="rank">3</span>
      <div class="avatar">N</div>
      <div class="info">
        <div class="line1">Nikola</div>
        <div class="line2">
          1200 ELO &nbsp;·&nbsp;
          <span class="wins">0W</span> <span class="losses">0L</span> &nbsp;·&nbsp;
          — &nbsp;·&nbsp; —
        </div>
      </div>
      <div class="pts-col">
        <span class="pts">0</span>
        <span class="pts-label">pts</span>
      </div>
    </div>

    <!-- Row 4 -->
    <div class="row">
      <span class="rank">4</span>
      <div class="avatar">S</div>
      <div class="info">
        <div class="line1">Stjepan</div>
        <div class="line2">
          1184 ELO &nbsp;·&nbsp;
          <span class="wins">0W</span> <span class="losses">1L</span> &nbsp;·&nbsp;
          0% &nbsp;·&nbsp;
          <span class="streak-loss">L1</span>
        </div>
      </div>
      <div class="pts-col">
        <span class="pts">0</span>
        <span class="pts-label">pts</span>
      </div>
    </div>

  </div>

</body>
</html>
