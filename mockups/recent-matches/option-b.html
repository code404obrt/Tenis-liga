<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Recent Matches — Option B</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F5;
      padding: 16px;
      max-width: 390px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
    }

    h3 {
      font-size: 15px;
      font-weight: 700;
      color: #27500A;
      margin-bottom: 12px;
    }

    .match {
      display: flex;
      gap: 12px;
      align-items: stretch;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .match:last-child { border-bottom: none; padding-bottom: 0; }
    .match:first-child { padding-top: 0; }

    /* Left: winner badge */
    .badge {
      width: 36px;
      flex-shrink: 0;
      background: #27500A;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .badge-letter {
      font-size: 14px;
      font-weight: 800;
      color: white;
    }

    .badge-label {
      font-size: 8px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Center: players + meta */
    .body {
      flex: 1;
      min-width: 0;
    }

    .players {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 5px;
    }

    .winner-name {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
    }

    .loser-name {
      font-size: 13px;
      color: #9ca3af;
    }

    .meta {
      font-size: 11px;
      color: #9ca3af;
    }

    /* Right: set scores, per row */
    .scores {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .score-row {
      display: flex;
      gap: 5px;
    }

    .set {
      font-size: 14px;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      min-width: 18px;
      text-align: center;
    }

    .set.won { font-weight: 700; color: #111827; }
    .set.lost { font-weight: 400; color: #d1d5db; }
  </style>
</head>
<body>
  <div class="card">
    <h3>Recent matches</h3>

    <!-- Match 1 -->
    <div class="match">
      <div class="badge">
        <span class="badge-letter">W</span>
        <span class="badge-label">win</span>
      </div>
      <div class="body">
        <div class="players">
          <span class="winner-name">Nikola</span>
          <span class="loser-name">Duje</span>
        </div>
        <span class="meta">5 Apr 2026 · Grass · Žnjan</span>
      </div>
      <div class="scores">
        <div class="score-row">
          <span class="set won">6</span>
          <span class="set won">6</span>
        </div>
        <div class="score-row">
          <span class="set lost">3</span>
          <span class="set lost">2</span>
        </div>
      </div>
    </div>

    <!-- Match 2: 3 sets -->
    <div class="match">
      <div class="badge">
        <span class="badge-letter">W</span>
        <span class="badge-label">win</span>
      </div>
      <div class="body">
        <div class="players">
          <span class="winner-name">Duje</span>
          <span class="loser-name">Slavko</span>
        </div>
        <span class="meta">2 Apr 2026 · Hard · Firule</span>
      </div>
      <div class="scores">
        <div class="score-row">
          <span class="set lost">3</span>
          <span class="set won">6</span>
          <span class="set won">7</span>
        </div>
        <div class="score-row">
          <span class="set won">6</span>
          <span class="set lost">4</span>
          <span class="set lost">5</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
