<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Matches — Option A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F5;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
    }

    h3 {
      font-size: 15px;
      font-weight: 700;
      color: #27500A;
      margin-bottom: 12px;
    }

    .match {
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .match:last-child { border-bottom: none; padding-bottom: 0; }
    .match:first-child { padding-top: 0; }

    /* Winner row — prominent */
    .winner-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .winner-name {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .winner-score {
      display: flex;
      gap: 0;
      flex-shrink: 0;
    }

    .set {
      font-size: 14px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      width: 28px;
      text-align: center;
    }

    .set.won { color: #27500A; }
    .set.lost { color: #d1d5db; font-weight: 400; }

    /* Loser row — muted */
    .loser-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .loser-name {
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
    }

    /* Meta */
    .meta {
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>Recent matches</h3>

    <!-- Match 1 -->
    <div class="match">
      <div class="winner-row">
        <span class="winner-name">Nikola</span>
        <div class="winner-score">
          <span class="set won">6</span>
          <span class="set won">6</span>
        </div>
      </div>
      <div class="loser-row">
        <span class="loser-name">Duje</span>
        <div class="winner-score">
          <span class="set lost">3</span>
          <span class="set lost">2</span>
        </div>
      </div>
      <span class="meta">5 Apr 2026 · Grass · Žnjan</span>
    </div>

    <!-- Match 2 -->
    <div class="match">
      <div class="winner-row">
        <span class="winner-name">Duje</span>
        <div class="winner-score">
          <span class="set lost">3</span>
          <span class="set won">6</span>
          <span class="set won">7</span>
        </div>
      </div>
      <div class="loser-row">
        <span class="loser-name">Slavko</span>
        <div class="winner-score">
          <span class="set won">6</span>
          <span class="set lost">4</span>
          <span class="set lost">5</span>
        </div>
      </div>
      <span class="meta">2 Apr 2026 · Hard · Firule</span>
    </div>

  </div>
</body>
</html>
