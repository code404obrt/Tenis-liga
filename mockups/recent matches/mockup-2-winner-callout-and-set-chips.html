<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recent Matches Mockup 2 - Compact Winner + Won Sets</title>
    <style>
      :root {
        --bg: #f1f1f1;
        --card: #ececec;
        --line: #d6d6d6;
        --text: #1e2430;
        --muted: #8a93a2;
        --winner: #2b5f13;
        --winner-soft: #edf6e8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 20px;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        width: min(760px, 100%);
        margin: 0 auto;
      }

      .card {
        background: var(--card);
        border: 1px solid #dedede;
        border-radius: 20px;
        padding: 20px;
      }

      .title {
        margin: 0 0 12px;
        color: #2a5916;
        font-size: 2rem;
        line-height: 1.1;
      }

      .match {
        padding: 14px 0;
      }

      .match + .match {
        border-top: 1px solid var(--line);
      }

      .winner-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .winner-badge {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--winner);
        background: var(--winner-soft);
        border: 1px solid #c7dcb7;
        border-radius: 999px;
        padding: 3px 9px;
      }

      .winner-text {
        margin-top: 6px;
        font-size: 1.65rem;
        line-height: 1.2;
      }

      .winner-text strong {
        color: var(--winner);
      }

      .sets-line {
        margin-top: 8px;
        font-size: 1.04rem;
      }

      .sets-label {
        color: #5d6a61;
        font-weight: 600;
        margin-right: 5px;
      }

      .sets-value {
        color: #1f4f0a;
        font-weight: 700;
      }

      .meta {
        margin-top: 8px;
        font-size: 1rem;
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .title { font-size: 1.5rem; }
        .winner-text { font-size: 1.25rem; }
        .sets-line { font-size: 0.95rem; }
        .meta { font-size: 0.9rem; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1 class="title">Recent matches</h1>

        <article class="match">
          <div class="winner-row">
            <span class="winner-badge">Winner</span>
            <span style="color:#4d5767;font-weight:700">2-0</span>
          </div>
          <div class="winner-text"><strong>Nikola</strong> vs Duje</div>
          <div class="sets-line">
            <span class="sets-label">Won sets:</span>
            <span class="sets-value">S1 6-3, S2 6-2</span>
          </div>
          <div class="meta">5 Apr 2026 - Grass - Znjan</div>
        </article>

        <article class="match">
          <div class="winner-row">
            <span class="winner-badge">Winner</span>
            <span style="color:#4d5767;font-weight:700">2-1</span>
          </div>
          <div class="winner-text"><strong>Duje</strong> vs Slavko</div>
          <div class="sets-line">
            <span class="sets-label">Won sets:</span>
            <span class="sets-value">S2 6-4, S3 7-5</span>
          </div>
          <div class="meta">2 Apr 2026 - Hard - Firule</div>
        </article>
      </section>
    </div>
  </body>
</html>
